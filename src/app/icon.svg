<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8b4c4"/>
      <stop offset="100%" style="stop-color:#e88a9e"/>
    </linearGradient>
  </defs>
  <!-- 5 sakura petals: ellipse rotated 72 deg each -->
  <ellipse cx="16" cy="10" rx="4" ry="7" fill="url(#petal)" transform="rotate(0 16 16)"/>
  <ellipse cx="16" cy="10" rx="4" ry="7" fill="url(#petal)" transform="rotate(72 16 16)"/>
  <ellipse cx="16" cy="10" rx="4" ry="7" fill="url(#petal)" transform="rotate(144 16 16)"/>
  <ellipse cx="16" cy="10" rx="4" ry="7" fill="url(#petal)" transform="rotate(216 16 16)"/>
  <ellipse cx="16" cy="10" rx="4" ry="7" fill="url(#petal)" transform="rotate(288 16 16)"/>
  <!-- center -->
  <circle cx="16" cy="16" r="3" fill="#c45c6a"/>
</svg>
